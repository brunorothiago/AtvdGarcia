<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro Mancha Verde</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #1f7a1f;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button, a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
        }

        button {
            background: #1f7a1f;
            color: white;
        }

        a {
            background: #ddd;
            color: black;
            margin-left: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Cadastro Mancha Verde</h1>

    <form th:action="@{/salvar}" th:object="${pessoa}" method="post">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" th:field="*{nome}" required>

        <label for="idade">Idade:</label>
        <input type="number" id="idade" th:field="*{idade}" required>

        <button type="submit">Cadastrar</button>
        <a th:href="@{/lista}">Ver lista</a>
    </form>
</div>
</body>
</html>
